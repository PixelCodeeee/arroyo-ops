name: "3 - Promote to Stable"
on:
  workflow_dispatch:

jobs:
  # ── Reusable test gate (Jest + k6) ──
  run-tests:
    uses: ./.github/workflows/test-gate.yml
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

  # ── Promote (only if tests pass) ──
  promote:
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ops Repository
        uses: actions/checkout@v4
        with:
          repository: PixelCodeeee/arroyo-ops
          path: ops
          token: ${{ secrets.GH_PAT }}

      - name: Authenticate GCP IAP (SSH & Redis)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_IAP_CREDENTIALS }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set Redis Announcement
        run: |
          gcloud compute ssh joshualuna@private-backend-vm \
            --project=beta-prime-489121 \
            --zone=us-central1-a \
            --tunnel-through-iap \
            --command="sudo docker exec microservices-redis-shared-1 redis-cli set maintenance:announcement:canary 'La sesion terminara pronto debido a la promocion de caracteristicas' EX 900"
        continue-on-error: true

      - name: Wait & Drain Canary Sessions
        run: |
          echo "Monitoring Canary drain on port 5100..."
          for i in {1..10}; do
            COUNT=$(gcloud compute ssh joshualuna@private-backend-vm \
              --project=beta-prime-489121 \
              --zone=us-central1-a \
              --tunnel-through-iap \
              --command="curl -s http://localhost:5100/internal/sessions/count" | jq -r '.active_sessions // 0' || echo "0")
            
            echo "Attempt $i: Current canary active sessions: $COUNT"
            
            if [ "$COUNT" -eq 0 ]; then
                echo "✅ Drain complete!"
                break
            fi
            sleep 60
          done

      # ─────────────────────────────────────────
      # ZERO-DOWNTIME: Route ALL traffic to canary BEFORE restarting stable
      # ─────────────────────────────────────────
      - name: Authenticate GCP (Load Balancer API)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Shift 100% Traffic to Canary (Pre-Restart)
        run: |
          echo "🔄 Shifting 100% traffic to canary before restarting stable..."

          gcloud compute url-maps describe arroyo-url-map \
            --project=beta-prime-489121 \
            --global \
            --format="json" > /tmp/raw-map.json

          jq 'del(.fingerprint, .creationTimestamp, .id, .selfLink, .kind)' /tmp/raw-map.json > /tmp/url-map.json

          # Route ALL traffic to canary (both backend and frontend)
          jq '
            .pathMatchers[0].pathRules[0] = {
              "paths": ["/api/*"],
              "routeAction": {
                "weightedBackendServices": [
                  { "backendService": "global/backendServices/arroyo-backend-svc-stable", "weight": 0 },
                  { "backendService": "global/backendServices/arroyo-backend-svc-canary", "weight": 100 }
                ]
              }
            } |
            del(.pathMatchers[0].defaultService) |
            .pathMatchers[0].defaultRouteAction = {
              "weightedBackendServices": [
                { "backendService": "global/backendServices/arroyo-frontend-svc-stable", "weight": 0 },
                { "backendService": "global/backendServices/arroyo-frontend-svc-canary", "weight": 100 }
              ]
            }
          ' /tmp/url-map.json > /tmp/url-map-canary.json

          gcloud compute url-maps import arroyo-url-map \
            --project=beta-prime-489121 \
            --global \
            --source=/tmp/url-map-canary.json \
            --quiet

          echo "✅ 100% traffic now on canary. Safe to restart stable."
          # Give the LB time to propagate the new routing
          sleep 15

      # ─────────────────────────────────────────
      # RESTART STABLE (zero traffic hitting it)
      # ─────────────────────────────────────────
      - name: Re-authenticate GCP IAP (SSH)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_IAP_CREDENTIALS }}

      - name: Promote Backend to Stable
        run: |
          BE_READY=$(jq -r '.backend.status' ops/manifests/canary.json)

          if [ "$BE_READY" == "ready" ]; then
            echo "🚀 Backend: Retagging canary → stable and restarting (0% traffic)..."
            gcloud compute ssh joshualuna@private-backend-vm \
              --project=beta-prime-489121 \
              --zone=us-central1-a \
              --tunnel-through-iap \
              --command="cd /home/joshualuna/arroyo_seco_stage2 && \
                echo 'Descargando y re-etiquetando imágenes...' && \
                sudo docker pull ghcr.io/pixelcodeeee/arroyo_seco_stage2/api-gateway:canary && \
                sudo docker pull ghcr.io/pixelcodeeee/arroyo_seco_stage2/auth-service:canary && \
                sudo docker pull ghcr.io/pixelcodeeee/arroyo_seco_stage2/catalog-service:canary && \
                sudo docker pull ghcr.io/pixelcodeeee/arroyo_seco_stage2/order-service:canary && \
                sudo docker pull ghcr.io/pixelcodeeee/arroyo_seco_stage2/reservation-service:canary && \
                sudo docker pull ghcr.io/pixelcodeeee/arroyo_seco_stage2/payment-service:canary && \
                sudo docker pull ghcr.io/pixelcodeeee/arroyo_seco_stage2/announcements-service:canary && \
                sudo docker tag ghcr.io/pixelcodeeee/arroyo_seco_stage2/api-gateway:canary ghcr.io/pixelcodeeee/arroyo_seco_stage2/api-gateway:stable && \
                sudo docker tag ghcr.io/pixelcodeeee/arroyo_seco_stage2/auth-service:canary ghcr.io/pixelcodeeee/arroyo_seco_stage2/auth-service:stable && \
                sudo docker tag ghcr.io/pixelcodeeee/arroyo_seco_stage2/catalog-service:canary ghcr.io/pixelcodeeee/arroyo_seco_stage2/catalog-service:stable && \
                sudo docker tag ghcr.io/pixelcodeeee/arroyo_seco_stage2/order-service:canary ghcr.io/pixelcodeeee/arroyo_seco_stage2/order-service:stable && \
                sudo docker tag ghcr.io/pixelcodeeee/arroyo_seco_stage2/reservation-service:canary ghcr.io/pixelcodeeee/arroyo_seco_stage2/reservation-service:stable && \
                sudo docker tag ghcr.io/pixelcodeeee/arroyo_seco_stage2/payment-service:canary ghcr.io/pixelcodeeee/arroyo_seco_stage2/payment-service:stable && \
                sudo docker tag ghcr.io/pixelcodeeee/arroyo_seco_stage2/announcements-service:canary ghcr.io/pixelcodeeee/arroyo_seco_stage2/announcements-service:stable && \
                echo 'Reiniciando contenedores stable (0% traffic)...' && \
                sudo docker compose up -d --no-deps api-gateway-stable auth-service-stable catalog-service-stable order-service-stable reservation-service-stable payment-service-stable announcements-service-stable && \
                sudo docker image prune -f"
          else
            echo "⏭️ No hay actualización de Backend. Saltando."
          fi

      - name: Promote Frontend to Stable
        run: |
          FE_READY=$(jq -r '.frontend.status' ops/manifests/canary.json)

          if [ "$FE_READY" == "ready" ]; then
            echo "🚀 Frontend: Retagging canary → stable and restarting (0% traffic)..."
            gcloud compute ssh joshualuna@nginx-public-vm \
              --project=beta-prime-489121 \
              --zone=us-central1-a \
              --tunnel-through-iap \
              --command="echo 'Descargando y re-etiquetando Frontend...' && \
                sudo docker pull ghcr.io/pixelcodeeee/arroyo_seco_pwa_stage2/frontend:canary && \
                sudo docker tag ghcr.io/pixelcodeeee/arroyo_seco_pwa_stage2/frontend:canary ghcr.io/pixelcodeeee/arroyo_seco_pwa_stage2/frontend:stable && \
                echo 'Reiniciando contenedor Frontend (0% traffic)...' && \
                (sudo docker stop frontend-stable-manual || true) && \
                (sudo docker rm frontend-stable-manual || true) && \
                sudo docker run -d --name frontend-stable-manual --restart always -p 3000:3000 ghcr.io/pixelcodeeee/arroyo_seco_pwa_stage2/frontend:stable && \
                sudo docker image prune -f"
          else
            echo "⏭️ No hay actualización de Frontend. Saltando."
          fi

      # ─────────────────────────────────────────
      # HEALTH CHECK: Wait for stable to be ready before routing traffic back
      # ─────────────────────────────────────────
      - name: Wait for Stable Containers to Boot
        run: sleep 15

      - name: Verify Stable Stack is Healthy
        run: |
          FE_READY=$(jq -r '.frontend.status' ops/manifests/canary.json)
          BE_READY=$(jq -r '.backend.status' ops/manifests/canary.json)

          if [ "$BE_READY" == "ready" ]; then
            echo "Verificando Backend Stable..."
            for i in {1..6}; do
              HEALTH=$(gcloud compute ssh joshualuna@private-backend-vm \
                --project=beta-prime-489121 \
                --zone=us-central1-a \
                --tunnel-through-iap \
                --command="curl -sf http://localhost:5000/health" 2>/dev/null || echo "FAIL")
              
              if echo "$HEALTH" | grep -q "OK"; then
                echo "✅ Backend Stable is healthy!"
                break
              fi
              echo "⏳ Attempt $i/6: Backend not ready yet, waiting 10s..."
              sleep 10
            done
          fi

          if [ "$FE_READY" == "ready" ]; then
            echo "Verificando Frontend Stable..."
            for i in {1..6}; do
              FE_HEALTH=$(gcloud compute ssh joshualuna@nginx-public-vm \
                --project=beta-prime-489121 \
                --zone=us-central1-a \
                --tunnel-through-iap \
                --command="curl -sf http://localhost:3000" 2>/dev/null || echo "FAIL")
              
              if [ "$FE_HEALTH" != "FAIL" ]; then
                echo "✅ Frontend Stable is healthy!"
                break
              fi
              echo "⏳ Attempt $i/6: Frontend not ready yet, waiting 10s..."
              sleep 10
            done
          fi

      # ─────────────────────────────────────────
      # RESET: Route traffic back to stable (now healthy with new code)
      # ─────────────────────────────────────────
      - name: Re-authenticate GCP (Load Balancer API)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Reset Traffic to 100% Stable
        run: |
          echo "🔄 Routing traffic back to stable (now running new code)..."

          gcloud compute url-maps describe arroyo-url-map \
            --project=beta-prime-489121 \
            --global \
            --format="json" > /tmp/raw-map.json

          jq 'del(.fingerprint, .creationTimestamp, .id, .selfLink, .kind)' /tmp/raw-map.json > /tmp/url-map.json

          # Reset to simple 100% stable routing
          jq '
            .pathMatchers[0].pathRules[0] = {
              "paths": ["/api/*"],
              "service": "global/backendServices/arroyo-backend-svc-stable"
            } |
            del(.pathMatchers[0].defaultRouteAction) |
            .pathMatchers[0].defaultService = "global/backendServices/arroyo-frontend-svc-stable"
          ' /tmp/url-map.json > /tmp/url-map-reset.json

          gcloud compute url-maps import arroyo-url-map \
            --project=beta-prime-489121 \
            --global \
            --source=/tmp/url-map-reset.json \
            --format=json \
            --quiet

          echo "✅ Promotion complete! 100% traffic on stable (new code)."

      # ─────────────────────────────────────────
      # MANIFEST RESET
      # ─────────────────────────────────────────
      - name: Reset Ops Manifest
        run: |
          cd ops
          if [ -f manifests/canary.json ]; then
            cp manifests/canary.json manifests/stable.json
          fi

          API_CONTRACT=$(jq -r '.api_contract // "v1"' manifests/stable.json)
          cat > manifests/canary.json <<MANIFEST
          {
            "api_contract": "${API_CONTRACT}",
            "frontend": { "commit": null, "built_at": null, "status": "missing" },
            "backend": { "commit": null, "built_at": null, "status": "missing" }
          }
          MANIFEST
          
          git config user.name "CI Bot"
          git config user.email "ci@arroyoseco.online"
          git add manifests/
          git commit -m "chore(ops): Promoted canary to stable and reset manifests" || echo "No changes"
          git push origin HEAD