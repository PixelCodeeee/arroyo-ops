name: "3 - Promote to Stable"
on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ops Repository
        uses: actions/checkout@v4
        with:
          repository: PixelCodeeee/arroyo-ops
          path: ops
          token: ${{ secrets.GH_PAT }}

      - name: Authenticate GCP IAP (SSH & Redis Warning)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_IAP_CREDENTIALS }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set Redis Announcement (via SSH)
        run: |
          gcloud compute ssh joshualuna@private-backend-vm \
            --project=beta-prime-489121 \
            --zone=us-central1-a \
            --tunnel-through-iap << 'EOF'
              sudo docker exec microservices-redis-shared-1 redis-cli set maintenance:announcement:canary 'La sesión terminará pronto debido a la promoción de características' EX 900
          EOF
        continue-on-error: true

      - name: Wait & Drain Canary Sessions
        run: |
          echo "Monitoring Canary drain on port 5100..."
          # Set a timeout (e.g., 10 loops = 10 mins) so CI doesn't run forever
          for i in {1..10}; do
            COUNT=$(gcloud compute ssh joshualuna@private-backend-vm \
              --project=beta-prime-489121 \
              --zone=us-central1-a \
              --tunnel-through-iap \
              --command="curl -s http://localhost:5100/internal/sessions/count" | jq -r '.active_sessions // 0' || echo "0")
            
            echo "Attempt $i: Current canary active sessions: $COUNT"
            
            if [ "$COUNT" -eq 0 ]; then
                echo "✅ Drain complete!"
                break
            fi
            sleep 60
          done

      - name: Update Stable Docker Containers
        run: |
          gcloud compute ssh joshualuna@private-backend-vm \
            --project=beta-prime-489121 \
            --zone=us-central1-a \
            --tunnel-through-iap << 'EOF'
              cd /home/joshualuna/arroyo_seco_stage2
              
              # Pull latest images tagged as stable
              sudo docker compose pull api-gateway-stable auth-service-stable catalog-service-stable order-service-stable reservation-service-stable payment-service-stable announcements-service-stable
              
              # Rolling update stable stack
              sudo docker compose up -d --no-deps api-gateway-stable auth-service-stable catalog-service-stable order-service-stable reservation-service-stable payment-service-stable announcements-service-stable
              
              # Cleanup orphaned images to save disk space
              sudo docker image prune -f
          EOF

      - name: Authenticate GCP (Load Balancer API)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Promote (Reset weights to 100% Stable)
        run: |
          # 1. Use describe with format json to get a clean, parseable file
          gcloud compute url-maps describe arroyo-url-map \
            --project=beta-prime-489121 \
            --global \
            --format="json" > /tmp/raw-map.json

          # 2. Strip GCP-managed fields that cause 'Invalid numeric literal' or 'ReadOnly' errors
          jq 'del(.fingerprint, .creationTimestamp, .id, .selfLink, .kind)' /tmp/raw-map.json > /tmp/url-map.json

          # 3. Reset both FE and BE back to simple 'service' targets (0% canary)
          jq '
            .pathMatchers[0].pathRules[0] = {
              "paths": ["/api/*"],
              "service": "global/backendServices/arroyo-backend-svc-stable"
            } |
            del(.pathMatchers[0].defaultRouteAction) |
            .pathMatchers[0].defaultService = "global/backendServices/arroyo-frontend-svc-stable"
          ' /tmp/url-map.json > /tmp/url-map-reset.json

          # 4. Final Import as JSON
          gcloud compute url-maps import arroyo-url-map \
            --project=beta-prime-489121 \
            --global \
            --source=/tmp/url-map-reset.json \
            --format=json \
            --quiet

      - name: Reset Ops Manifest
        run: |
          cd ops
          # Merge canary status into stable before resetting canary
          if [ -f manifests/canary.json ]; then
            cp manifests/canary.json manifests/stable.json
          fi

          # Create fresh empty canary manifest
          cat <<EOF > manifests/canary.json
          {
            "api_contract": "$(jq -r '.api_contract // "v1"' manifests/stable.json)",
            "frontend": { "commit": null, "built_at": null, "status": "missing" },
            "backend": { "commit": null, "built_at": null, "status": "missing" }
          }
          EOF
          
          git config user.name "CI Bot"
          git config user.email "ci@arroyoseco.online"
          git add manifests/
          git commit -m "chore(ops): Promoted canary to stable and reset manifests" || echo "No changes"
          git push origin HEAD