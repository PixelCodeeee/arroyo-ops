name: "2 - Shift Traffic to Canary"
on:
  workflow_dispatch:

jobs:
  # ── Reusable test gate (Jest + k6) ──
  run-tests:
    uses: ./.github/workflows/test-gate.yml
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

  # ── Shift traffic (only if tests pass) ──
  shift-traffic:
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ops Repository
        uses: actions/checkout@v4
        with:
          repository: PixelCodeeee/arroyo-ops
          path: ops
          token: ${{ secrets.GH_PAT }}

      - name: Authenticate (IAP for SSH)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_IAP_CREDENTIALS }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Broadcast Maintenance Message
        run: |
          # Using heredoc to avoid any bash quote escaping issues
          gcloud compute ssh joshualuna@private-backend-vm \
            --project=beta-prime-489121 \
            --zone=us-central1-a \
            --tunnel-through-iap << 'EOF'
              sudo docker exec microservices-redis-shared-1 redis-cli set maintenance:announcement:stable 'La sesión terminará pronto debido a una actualización' EX 900
          EOF
        continue-on-error: true

      - name: Authenticate (Load Balancer Management)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Apply Traffic Shift
        run: |
          FE_READY=$(jq -r '.frontend.status' ops/manifests/canary.json)
          BE_READY=$(jq -r '.backend.status' ops/manifests/canary.json)

          # 1. Export to a physical file first to isolate the gcloud output
          gcloud compute url-maps describe arroyo-url-map \
            --project=beta-prime-489121 \
            --global \
            --format="json" > /tmp/raw-map.json

          # 2. Clean the JSON and strip GCP-managed readonly fields
          # This prevents jq from tripping over fingerprints or IDs
          jq 'del(.fingerprint, .creationTimestamp, .id, .selfLink, .kind)' /tmp/raw-map.json > /tmp/url-map.json

          # 3. Patch Backend
          if [ "$BE_READY" == "ready" ]; then
            echo "🚀 Patching Backend: 10% Canary / 90% Stable"
            jq '
              .pathMatchers[0].pathRules[0] = {
                "paths": ["/api/*"],
                "routeAction": {
                  "weightedBackendServices": [
                    { "backendService": "global/backendServices/arroyo-backend-svc-stable", "weight": 90,
                      "headerAction": { "requestHeadersToAdd": [{ "headerName": "x-backend-version", "headerValue": "stable", "replace": true }] } },
                    { "backendService": "global/backendServices/arroyo-backend-svc-canary", "weight": 10,
                      "headerAction": { "requestHeadersToAdd": [{ "headerName": "x-backend-version", "headerValue": "canary", "replace": true }] } }
                  ]
                }
              }
            ' /tmp/url-map.json > /tmp/url-map-temp.json && mv /tmp/url-map-temp.json /tmp/url-map.json
          fi

          # 4. Patch Frontend
          if [ "$FE_READY" == "ready" ]; then
            echo "🚀 Patching Frontend: 10% Canary / 90% Stable"
            jq '
              del(.pathMatchers[0].defaultService) |
              .pathMatchers[0].defaultRouteAction = {
                "weightedBackendServices": [
                  { "backendService": "global/backendServices/arroyo-frontend-svc-stable", "weight": 90,
                    "headerAction": { "requestHeadersToAdd": [{ "headerName": "x-frontend-version", "headerValue": "stable", "replace": true }] } },
                  { "backendService": "global/backendServices/arroyo-frontend-svc-canary", "weight": 10,
                    "headerAction": { "requestHeadersToAdd": [{ "headerName": "x-frontend-version", "headerValue": "canary", "replace": true }] } }
                ]
              }
            ' /tmp/url-map.json > /tmp/url-map-temp.json && mv /tmp/url-map-temp.json /tmp/url-map.json
          fi

          # 5. Final Import
          if [ "$BE_READY" == "ready" ] || [ "$FE_READY" == "ready" ]; then
            gcloud compute url-maps import arroyo-url-map \
              --project=beta-prime-489121 \
              --global \
              --source=/tmp/url-map.json \
              --quiet
          else
            echo "⚠️ Nothing ready to shift."
            exit 1
          fi
      - name: Wait for Metrics
        run: |
          echo "Traffic shift applied. Monitoring for 5 minutes..."
          sleep 300