name: "Test Gate"
on:
  workflow_call:
    secrets:
      GH_PAT:
        required: true
      K6_CLOUD_TOKEN:
        required: false

jobs:
  test-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Backend Repository
        uses: actions/checkout@v4
        with:
          repository: PixelCodeeee/arroyo_seco_stage2
          path: backend
          token: ${{ secrets.GH_PAT }}

      - name: Checkout Ops Repository
        uses: actions/checkout@v4
        with:
          repository: PixelCodeeee/arroyo-ops
          path: ops
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Jest/Supertest Unit Tests ──
      - name: Run API Gateway Unit Tests
        run: |
          cd backend/api-gateway
          npm ci
          npm test

      # ── k6 Canary Health Check ──
      - name: Run k6 Canary Health Check
        uses: grafana/k6-action@v0.3.1
        with:
          filename: ops/scripts/canary-load-test.js
        env:
          BASE_URL: https://arroyoseco.online
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

      - name: Gate Result
        run: echo "✅ All tests passed."
